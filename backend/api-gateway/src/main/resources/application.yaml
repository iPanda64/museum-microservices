server:
  port: 8000

spring:
  application:
    name: api-gateway
  
  codec:
    max-in-memory-size: 10MB

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/api/credentials/**

        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/users/**

        - id: artist-service
          uri: http://artist-service:8080
          predicates:
            - Path=/api/artists/**

        - id: art-storage
          uri: http://minio:9000
          predicates:
            - Path=/media/art/**
          filters:
            - RewritePath=/media/art/(?<segment>.*), /art-bucket/${segment}

        - id: artist-storage
          uri: http://minio:9000
          predicates:
            - Path=/media/artist/**
          filters:
            - RewritePath=/media/artist/(?<segment>.*), /artist-bucket/${segment}

management:
  endpoints:
    web:
      exposure:
        include: health, info
