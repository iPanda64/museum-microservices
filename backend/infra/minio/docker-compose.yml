services:
  minio:
    image: minio/minio
    container_name: museum-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data:/data
    command: server /data --console-address ":9001"

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo '...waiting for minio...' && sleep 1; done;
      /usr/bin/mc mb myminio/art-bucket;
      /usr/bin/mc mb myminio/artist-bucket;
      /usr/bin/mc anonymous set download myminio/art-bucket;
      /usr/bin/mc anonymous set download myminio/artist-bucket;
      exit 0;
      "
