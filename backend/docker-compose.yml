include:
  - infra/minio/docker-compose.yml

services:
  # Entry Point
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: museum-gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - user-service

  # Services
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: museum-auth
    ports:
      - "8080:8080"
    volumes:
      - ./auth-service/museum_auth.db:/app/museum_auth.db
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - minio

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: museum-user
    ports:
      - "8081:8080"
    volumes:
      - ./user-service/museum_user.db:/app/museum_user.db
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - minio
      - auth-service

  artist-service:
    build:
      context: ./artist-service
      dockerfile: Dockerfile
    container_name: museum-artist
    ports:
      - "8082:8080"
    volumes:
      - ./artist-service/museum_artist.db:/app/museum_artist.db
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - minio
      - auth-service

  art-service:
    build:
      context: ./art-service
      dockerfile: Dockerfile
    container_name: museum-art
    ports:
      - "8083:8080"
    volumes:
      - ./art-service/museum_art.db:/app/museum_art.db
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - minio
      - auth-service

  export-service:
    build:
      context: ./export-service
      dockerfile: Dockerfile
    container_name: museum-export
    ports:
      - "8084:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - auth-service

  # Placeholders for future services
  # art-service:
  #   build: ./art-service

