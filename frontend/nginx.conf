server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Extract JWT from cookie and set as variable
    set $auth_header "";
    if ($http_authorization) {
        set $auth_header $http_authorization;
    }
    if ($cookie_jwt) {
        set $auth_header "Bearer $cookie_jwt";
    }

    # 1. ROUTE ALL BACKEND API CALLS
    location /api {
        proxy_pass http://api-gateway:8000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $auth_header;
    }

    location ^~ /admin {
        auth_request /auth-verify-admin;
        try_files $uri $uri/ /admin.html =404;
    }

    location ^~ /manager {
        auth_request /auth-verify-manager;
        try_files $uri $uri/ /manager.html =404;
    }

    location ^~ /employee {
        auth_request /auth-verify-employee;
        try_files $uri $uri/ /employee.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    location = /auth-verify-admin {
        internal;
        proxy_pass http://auth-service:8080/api/auth/verify-admin;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $auth_header;
    }

    location = /auth-verify-manager {
        internal;
        proxy_pass http://auth-service:8080/api/auth/verify-manager;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $auth_header;
    }

    location = /auth-verify-employee {
        internal;
        proxy_pass http://auth-service:8080/api/auth/verify-employee;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $auth_header;
    }
}
